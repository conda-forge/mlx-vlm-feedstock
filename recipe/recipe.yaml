schema_version: 1

context:
  name: mlx-vlm
  version: "0.6.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/mlx_vlm-${{ version }}.tar.gz
  sha256: f5541eb7c22345a951f7fb78376ed80e8e42bd7c179fb0daa40a21592c7b2adb

build:
  number: 0
  noarch: python
  script:
    - sed -i 's/opencv-python>=4.12.0.88/opencv-python>=4.12/g' requirements.txt
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - sed
  run:
    - python >=${{ python_min }}
    - mlx >=0.31.2
    - datasets >=2.19.1
    - tqdm >=4.66.2
    - transformers >=5.5.0
    - pillow >=10.3.0
    - requests >=2.31.0
    - mlx-lm >=0.31.3
    - fastapi >=0.95.1
    - numpy
    - uvicorn
    - miniaudio >=1.59
    - opencv >=4.12.0.88
    - mlx-audio >=0.4.3
    - llguidance >=1.7.0
    - starlette >=1.0.1
tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - mlx_vlm

about:
  summary: Vision LLMs on Apple silicon with MLX and the Hugging Face Hub
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Blaizzy/mlx-vlm

extra:
  recipe-maintainers:
    - xhochy
